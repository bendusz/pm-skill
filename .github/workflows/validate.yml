name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: bash scripts/validate.sh
      - name: Shellcheck hooks and scripts
        run: shellcheck plugins/pm-skill/hooks/*.sh scripts/*.sh
